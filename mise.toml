[tools]
copier = "9.17.0"
uv = "0.11.29"
shellcheck = "0.11.0"
"github:anordal/shellharden" = "4.3.2"
shfmt = "3.13.1"
tombi = "1.2.0"
"github:owenlamont/ryl" = "0.21.0"
actionlint = "1.7.12"
pinact = "4.1.0"
ghalint = "1.5.6"
gitleaks = "8.30.1"
biome = "2.5.4"
rumdl = "0.2.34"
zizmor = "1.27.0"
typos = "1.48.0"
hk = "1.52.0"
goreleaser = "2.17.0"
ruff = "0.15.22"
ty = "0.0.60"
"npm:renovate" = "latest"
cocogitto = "7.0.0"

[settings]
task.timings = false

[settings.npm]
# Fresh CI runners default the npm backend to aube, whose trust-downgrade
# guard currently blocks npm:renovate via a transitive dep
# (@yarnpkg/libzip@3.2.2 dropped provenance attestation that 3.2.0/3.2.1
# had) - unrelated to which renovate version we pin, and out of our
# control. Pin the backend to plain npm for this repo's own tool installs
# so that unblocks. The Copier template (template/mise.toml.jinja) keeps
# aube's default for consumer repos - that's about catching regressions
# in tools *we* pin directly (like npm:cpd), a different tradeoff.
package_manager = "npm"
