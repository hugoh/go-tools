project_name: hrd
has_goreleaser: true
project_description: "Multi-repo manager for git and jj with parallel execution and live status"
goreleaser_version_pkg: "github.com/hugoh/hrd/cmd"
has_homebrew_cask: true
goreleaser_before_hooks: ["go run ./cmd/genman"]
nfpm_extra_contents: [{src: "man/*.1", dst: "/usr/share/man/man1"}]
has_test_int: false
has_gen: true
gen_sources: ["README.md.tpl", "cmd/**/*.go"]
gen_outputs: ["README.md"]
gen_cmd: ["go generate ./...", "dprint fmt README.md"]
gen_check_cmd: "git diff --exit-code README.md"
has_fuzz: false
golangci_extra_disable: [
  depguard,
  exhaustruct,
  godoclint,
  ireturn,
  testpackage,
  varnamelen,
]
golangci_test_exclude_linters: [err113, noctx, varnamelen, goconst, gosec]
golangci_extra_exclusions: []
coverage_total: 90
testcoverage_overrides: [{path: "backends/", threshold: 100}]
testcoverage_excludes: [
  "main\\.go$ # Program entry point",
  "cmd/genreadme/",
  "internal/backend/backendtest/ # shared test helpers, exercised only from other packages' tests",
]
cog_omit_types: []
