project_name: upd
has_goreleaser: true
project_description: "Tool to monitor if the network connection is up"
goreleaser_version_pkg: "github.com/hugoh/upd/internal/version"
dev_watch: false
has_test_int: true
test_int_cmd: "gotestsum -- -count=1 -race -tags=integration ./..."
has_gen: false
has_fuzz: false
golangci_extra_disable: [depguard, exhaustruct, godoclint, testpackage]
golangci_test_exclude_linters: [err113, noctx, varnamelen]
golangci_revive_overrides: false
golangci_extra_exclusions: []
coverage_total: 80
testcoverage_overrides: []
testcoverage_excludes: []
cog_omit_types: ["lint"]
codecov_style: simple
codecov_ignore: ["internal/version"]
hk_has_golangci_step: true
hk_has_goreleaser_step: false
hk_prepush_with_go_ci: false
