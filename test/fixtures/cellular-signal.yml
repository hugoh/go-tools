project_name: cellular-signal
has_goreleaser: false
has_test_int: true
has_gen: false
has_fuzz: true
golangci_extra_disable: []
golangci_test_exclude_linters: [depguard, goconst, varnamelen]
golangci_extra_exclusions:
  - path: "thresholds.go"
    linters: [mnd]
coverage_total: 100
testcoverage_overrides: []
testcoverage_excludes: []
test_int_cmd: "test ! -d internal || gotestsum -- -count=1 -race -tags=integration ./internal/..."
