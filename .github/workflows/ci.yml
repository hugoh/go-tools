---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  hk:
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
      - name: hk checks
        run: hk check --no-progress --profile ci --all
      - name: Display hk log on failure
        if: failure()
        run: cat /home/runner/.local/state/hk/output.log

  changes:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      relevant_count: ${{ steps.filter.outputs.relevant_count }}
      mise_toml_only_count: ${{ steps.filter.outputs.mise_toml_only_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Check for template-relevant changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # dorny/paths-filter's default predicate-quantifier ('some') matches a file
          # if it matches ANY single pattern independently, so a lone '!exclude' pattern
          # doesn't behave as exclusion (see README's predicate-quantifier section).
          # Two plain filters + a count comparison sidesteps that instead of relying on negation.
          filters: |
            relevant:
              - 'template/**'
              - 'copier.yml'
              - '.github/workflows/go-*.yml'
            mise_toml_only:
              - 'template/mise.toml.jinja'

  notify-consumers:
    needs: [hk, changes]
    if: |
      github.event_name == 'push' &&
      fromJSON(needs.changes.outputs.relevant_count) > fromJSON(needs.changes.outputs.mise_toml_only_count)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Dispatch update event to consumer repos
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Dispatching to ${repo}"
            gh api "repos/${repo}/dispatches" -f event_type=go-tools-updated
          done < consumers.txt
