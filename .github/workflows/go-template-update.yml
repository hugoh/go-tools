---
name: go-template-update

on:
  workflow_call:
    secrets:
      gh_token:
        required: true

jobs:
  update:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    concurrency:
      group: go-template-update-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Run copier update
        run: copier update -f --trust
      - name: Verify template update didn't break anything
        run: hk check --no-progress --profile ci --all --no-fail-fast
      - name: Open PR if template changed
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}
        run: |
          if git diff --quiet; then
            echo "No template changes"
            exit 0
          fi
          COMMIT=$(grep '^_commit:' .copier-answers.yml | awk '{print $2}')
          BRANCH="go-tools-update/${COMMIT}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git checkout -b "${BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update from go-tools template"
          git push origin "${BRANCH}" --force

          if ! CREATE_OUT=$(gh pr create \
            --title "chore: update from go-tools template (${COMMIT})" \
            --body "Automated \`copier update\` from [hugoh/go-tools](https://github.com/hugoh/go-tools)@${COMMIT}. Auto-merges once hk/goci/release pass — review the diff first if you want to intervene." \
            --head "${BRANCH}" \
            --base main 2>&1); then
            if ! echo "$CREATE_OUT" | grep -qi "already exists"; then
              echo "$CREATE_OUT" >&2
              echo "::error::gh pr create failed for ${BRANCH}"
              exit 1
            fi
            echo "PR already exists for ${BRANCH}, continuing"
          fi

          if ! MERGE_OUT=$(gh pr merge --auto --squash "${BRANCH}" 2>&1); then
            if ! echo "$MERGE_OUT" | grep -qiE "already merged|auto-merge is already"; then
              echo "$MERGE_OUT" >&2
              echo "::error::gh pr merge failed for ${BRANCH}"
              exit 1
            fi
            echo "PR for ${BRANCH} already merged or automerge already set, continuing"
          fi
