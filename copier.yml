# Forces this literal URL into every consumer's .copier-answers.yml `_src_path`,
# regardless of how `copier copy`/`copier update` was actually invoked (e.g. the
# `gh:hugoh/go-tools` shorthand). Renovate's copier manager can't resolve the
# `gh:` shorthand to a repo, so without this pin it silently stops proposing
# template updates. Remove once renovatebot/renovate#39938 is fixed.
# Do not remove until then, even though it looks redundant.
_min_copier_version: "9.0.0"
_src_path: https://github.com/hugoh/go-tools.git
_answers_file: .copier-answers.yml
_subdirectory: template
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[["
  variable_end_string: "]]"

project_name:
  type: str
  help: "Project/binary name (e.g. hrd) — used in .goreleaser.yml and its GitHub homepage URL"

has_goreleaser:
  type: bool
  default: false
  help: Project ships a binary release via goreleaser (adds .goreleaser.yml)

project_description:
  type: str
  default: ""
  help: One-line description used in .goreleaser.yml's nfpms/homebrew_casks blocks
  when: "[[ has_goreleaser ]]"

goreleaser_version_pkg:
  type: str
  default: "main"
  help: "Go package path whose 'version' var gets ldflags-injected (e.g. main, github.com/hugoh/hrd/cmd)"
  when: "[[ has_goreleaser ]]"

has_homebrew_cask:
  type: bool
  default: false
  help: Also publish a Homebrew cask on release (needs a TAP_GITHUB_TOKEN secret)
  when: "[[ has_goreleaser ]]"

goreleaser_before_hooks:
  type: json
  default: []
  help: "Shell commands to run before goreleaser build (e.g. release-time codegen): list of strings"
  when: "[[ has_goreleaser ]]"

nfpm_extra_contents:
  type: json
  default: []
  help: "Extra files to include in deb/rpm packages: list of {src, dst} objects"
  when: "[[ has_goreleaser ]]"

has_executable:
  type: bool
  default: true
  help: Project has a main package that produces an executable (adds the dev mise task)

has_test_int:
  type: bool
  default: false
  help: Project has an integration-test mise task

test_int_cmd:
  type: str
  default: "gotestsum -- -count=1 -race -tags=integration ./internal/..."
  help: Shell command for the test-int mise task
  when: "[[ has_test_int ]]"

has_gen:
  type: bool
  default: false
  help: Project has a codegen step whose output should be committed (adds gen/gen-check mise tasks)

gen_sources:
  type: json
  default: []
  help: "Source file globs that trigger regeneration: list of strings"
  when: "[[ has_gen ]]"

gen_outputs:
  type: json
  default: []
  help: "Generated file paths (also used by gen-check to diff): list of strings"
  when: "[[ has_gen ]]"

gen_cmd:
  type: json
  default: []
  help: "Shell commands to run to regenerate: list of strings"
  when: "[[ has_gen ]]"

gen_check_cmd:
  type: str
  default: "git diff --exit-code"
  help: Shell command that fails if generated output is stale
  when: "[[ has_gen ]]"

has_pages:
  type: bool
  default: false
  help: Deploys a static site to GitHub Pages on push to main (adds go-pages job + mise pages-build task)

pages_gen_cmd:
  type: json
  default: []
  help: "Shell commands to run to build the site: list of strings"
  when: "[[ has_pages ]]"

pages_dir:
  type: str
  default: "site"
  help: Directory containing the built site to publish to GitHub Pages
  when: "[[ has_pages ]]"

has_fuzz:
  type: bool
  default: false
  help: Project has a fuzz mise task

golangci_extra_disable:
  type: json
  default: []
  help: Extra golangci-lint linters to disable beyond the shared baseline

golangci_test_exclude_linters:
  type: json
  default: ["err113", "funlen", "varnamelen"]
  help: Linters excluded for _test.go files

golangci_settings:
  type: str
  default: ""
  help: "Extra linter settings under linters.settings (raw YAML block, e.g. tagliatelle, revive, etc.)"

golangci_extra_exclusions:
  type: json
  default: []
  help: "Extra exclusion rules beyond the _test.go$ rule: list of {path, linters}"

coverage_total:
  type: int
  default: 90
  help: go-test-coverage total threshold

testcoverage_overrides:
  type: json
  default: []
  help: "Per-path coverage threshold overrides for .testcoverage.yml: list of {path, threshold}"

testcoverage_excludes:
  type: json
  default: []
  help: List of exclude path patterns for .testcoverage.yml

cog_omit_types:
  type: json
  default: []
  help: "Commit types to omit from changelog in cog.toml (e.g. doc, lint): list of strings"
